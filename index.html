<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Game JS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.5); color: white; padding: 20px; text-align: center;
            cursor: pointer; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>Click to Play</h1>
        <p>(W,A,S,D = Move | SPACE = Jump | SHIFT = Crouch | LMB = Place | RMB = Break)</p>
    </div>
    <div id="crosshair"></div>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } } </script>
    <script type="module" src="game.js"></script>
</body>
</html>
